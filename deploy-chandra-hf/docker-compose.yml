version: "3.8"

services:
  chandra-vllm:
    build:
      context: .
      dockerfile: Dockerfile
    image: chandra-vllm:latest
    restart: unless-stopped
    ports:
      - "7888:7888"
    volumes:
      - /media/drive-2t/hoangnv83/code/ocr/ocr-challange-duong/models/chandra_lora_merge:/models/chandra-custom:ro
    environment:
      # Override as needed
      PORT: 7888
      MODEL_ID: /models/chandra-custom
      VLLM_DTYPE: float16
      VLLM_GPU_MEMORY_UTILIZATION: 0.75
      TENSOR_PARALLEL_SIZE: 2
      VLLM_EXTRA_ARGS: "--trust-remote-code"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              device_ids: ["1"]
